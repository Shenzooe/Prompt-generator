<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Model List</title></head>
<body>
<button onclick="load()">查詢可用模型</button>
<pre id="out"></pre>
<script>
async function load() {
  document.getElementById('out').textContent = '查詢中...';
  const res = await fetch('/api/generate-image', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ listModels: true })
  });
  const data = await res.json();
  document.getElementById('out').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
