<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFMT Product Image Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 20px; }
.app { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
h1 { font-size: 16px; font-weight: 600; padding: 12px 0 4px; }
.lbl { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.card { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 1rem 1.25rem; }
.row { display: flex; gap: 6px; flex-wrap: wrap; }
.nb { font-size: 13px; padding: 5px 11px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; color: #1a1a1a; transition: all .12s; }
.nb:hover { background: #f0f0ee; }
.nb.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.mg { display: flex; gap: 8px; flex-wrap: wrap; }
.mb { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 6px 8px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; transition: all .12s; min-width: 72px; max-width: 88px; }
.mb:hover { background: #f0f0ee; border-color: #aaa; }
.mb.on { border: 2px solid #1a1a1a; background: #f0f0ee; }
.mt { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; border: 0.5px solid #ddd; }
.ml { font-size: 10px; color: #888; text-align: center; line-height: 1.2; max-width: 80px; word-break: break-word; }
.mb.on .ml { color: #1a1a1a; font-weight: 500; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.ob { font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; color: #1a1a1a; text-align: left; transition: all .12s; }
.ob:hover { background: #f0f0ee; }
.ob.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.cg { display: grid; grid-template-columns: repeat(auto-fill, minmax(62px, 1fr)); gap: 5px; }
.cs { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 5px 3px; border-radius: 8px; border: 0.5px solid transparent; transition: all .12s; }
.cs:hover { border-color: #ccc; background: #f0f0ee; }
.cs.on { border-color: #1a1a1a; background: #f0f0ee; }
.sc { width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid #ddd; }
.sn { font-size: 10px; color: #888; text-align: center; line-height: 1.2; }
.gb { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }
.gb:hover { opacity: .85; }
.out { background: #f5f5f3; border: 0.5px solid #e0e0de; border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }
.cp { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; color: #666; float: right; }
.cp:hover { color: #1a1a1a; }
.tag { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f0f0ee; border: 0.5px solid #ddd; color: #888; }
.tag.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.cr { font-size: 12px; margin-top: 8px; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.ht { font-size: 11px; color: #aaa; margin-top: 6px; clear: both; }
#oa { display: none; }
</style>
</head>
<body>
<div class="app">
<h1>EFMT Product Image Prompt Generator</h1>
<div class="card">
  <div class="lbl">1. 選擇產品類別</div>
  <div class="row" id="cb"></div>
  <div id="s1a" style="margin-top:10px;display:none">
    <div class="lbl" style="margin-bottom:5px">子類別</div>
    <div class="row" id="s1b"></div>
  </div>
  <div id="s2a" style="margin-top:10px;display:none">
    <div class="lbl" style="margin-bottom:5px">材質</div>
    <div class="mg" id="s2b"></div>
  </div>
  <div id="cr" class="cr" style="display:none"></div>
</div>
<div class="card">
  <div class="lbl">2. 桌型</div>
  <div class="g3">
    <button class="ob on" data-v="round table">圓桌</button>
    <button class="ob" data-v="square table">方桌</button>
    <button class="ob" data-v="rectangular banquet table">長桌</button>
  </div>
</div>
<div class="card">
  <div class="lbl">3. 顏色</div>
  <div class="cg" id="cg"></div>
</div>
<div class="card">
  <div class="lbl">4. 風格</div>
  <div class="g2" id="stb">
    <button class="ob on" data-v="romantic">Romantic &amp; Soft</button>
    <button class="ob" data-v="minimalist">Modern Minimalist</button>
    <button class="ob" data-v="bohemian">Rustic Bohemian</button>
    <button class="ob" data-v="glamour">Luxe Glamour</button>
    <button class="ob" data-v="garden">Garden Whimsical</button>
    <button class="ob" data-v="classic">Timeless Classic</button>
  </div>
</div>
<button class="gb" id="gb">生成 Prompt</button>
<div id="oa">
  <div class="card">
    <div class="lbl">Prompt — 複製貼入 Nano Banana</div>
    <div class="out" id="po"></div>
    <button class="cp" id="cpb">Copy</button>
    <p class="ht">已包含 --no negative prompt</p>
  </div>
</div>
</div>

  });

  var s1a = document.getElementById('s1a'), s1b = document.getElementById('s1b');
  if (S.cat && NAV[S.cat] && Object.keys(NAV[S.cat]).length) {
    s1a.style.display = '';
    s1b.innerHTML = '';
    Object.keys(NAV[S.cat]).forEach(function(s) {
      var b = document.createElement('button');
      b.className = 'nb' + (S.sub1===s ? ' on' : '');
      b.textContent = s;
      b.setAttribute('data-sub1', s);
      s1b.appendChild(b);
    });
  } else { s1a.style.display = 'none'; }

  var s2a = document.getElementById('s2a'), s2b = document.getElementById('s2b');
  if (S.sub1 && NAV[S.cat] && NAV[S.cat][S.sub1] && NAV[S.cat][S.sub1].length) {
    s2a.style.display = '';
    s2b.innerHTML = '';
    NAV[S.cat][S.sub1].forEach(function(s) {
      var ik = imgKey(s);
      var b = document.createElement('button');
      b.className = 'mb' + (S.sub2===s ? ' on' : '');
      b.setAttribute('data-sub2', s);
      if (ik && IMGS[ik]) {
        var img = document.createElement('img');
        img.className = 'mt';
        img.src = IMGS[ik];
        img.alt = s;
        var sp = document.createElement('span');
        sp.className = 'ml';
        sp.textContent = s;
        b.appendChild(img);
        b.appendChild(sp);
      } else {
        var sp = document.createElement('span');
        sp.className = 'ml';
        sp.style.padding = '12px 4px';
        sp.style.fontSize = '12px';
        sp.textContent = s;
        b.appendChild(sp);
      }
      s2b.appendChild(b);
    });
  } else { s2a.style.display = 'none'; }

  var cr = document.getElementById('cr');
  var parts = [S.cat, S.sub1, S.sub2].filter(function(x) { return x; });
  if (parts.length) {
    cr.style.display = '';
    cr.innerHTML = '';
    parts.forEach(function(p, i) {
      if (i > 0) {
        var sep = document.createElement('span');
        sep.style.color = '#aaa';
        sep.style.fontSize = '11px';
        sep.textContent = ' › ';
        cr.appendChild(sep);
      }
      var t = document.createElement('span');
      t.className = 'tag' + (i===parts.length-1 ? ' on' : '');
      t.textContent = p;
      cr.appendChild(t);
    });
  } else { cr.style.display = 'none'; }

  document.querySelectorAll('[data-v]').forEach(function(b) {
    var isTable = b.parentElement.className === 'g3';
    var isStyle = b.parentElement.id === 'stb';
    if (isTable) b.className = 'ob' + (b.getAttribute('data-v')===S.table ? ' on' : '');
    if (isStyle) b.className = 'ob' + (b.getAttribute('data-v')===S.style ? ' on' : '');
  });

  var cg = document.getElementById('cg');
  cg.innerHTML = '';
  COLORS.forEach(function(col) {
    var d = document.createElement('div');
    d.className = 'cs' + (S.color===col.n ? ' on' : '');
    d.setAttribute('data-color', col.n);
    var circle = document.createElement('div');
    circle.className = 'sc';
    circle.style.background = col.h;
    if (col.h === '#FFFFFF') circle.style.border = '1px solid #ccc';
    var name = document.createElement('span');
    name.className = 'sn';
    name.textContent = col.n;
    d.appendChild(circle);
    d.appendChild(name);
    cg.appendChild(d);
  });
}

document.getElementById('cb').addEventListener('click', function(e) {
  var b = e.target.closest('[data-cat]');
  if (b) { S.cat = b.getAttribute('data-cat'); S.sub1 = null; S.sub2 = null; render(); }
});
document.getElementById('s1b').addEventListener('click', function(e) {
  var b = e.target.closest('[data-sub1]');
  if (b) { S.sub1 = b.getAttribute('data-sub1'); S.sub2 = null; render(); }
});
document.getElementById('s2b').addEventListener('click', function(e) {
  var b = e.target.closest('[data-sub2]');
  if (b) { S.sub2 = b.getAttribute('data-sub2'); render(); }
});
document.querySelector('.g3').addEventListener('click', function(e) {
  var b = e.target.closest('[data-v]');
  if (b) { S.table = b.getAttribute('data-v'); render(); }
});
document.getElementById('stb').addEventListener('click', function(e) {
  var b = e.target.closest('[data-v]');
  if (b) { S.style = b.getAttribute('data-v'); render(); }
});
document.getElementById('cg').addEventListener('click', function(e) {
  var d = e.target.closest('[data-color]');
  if (d) { S.color = d.getAttribute('data-color'); render(); }
});

document.getElementById('gb').addEventListener('click', function() {
  var styleDesc = STYLES[S.style] || STYLES.romantic;
  var pk = S.sub1 || S.cat || 'wedding party product';
  var pd = PM[pk] || pk.toLowerCase();
  var col = COLORS.find(function(c) { return c.n === S.color; });
  var colorDesc = col ? col.p : 'neutral elegant palette';
  var matKey2 = S.sub2 || S.sub1;
  var drape = MT[matKey2] || 'natural gravity-driven fabric folds, soft organic wrinkles cascading down, realistic cloth weight and drape';
  var mat = S.sub2 ? ', ' + S.sub2.toLowerCase() + ' material,' : ',';
  var tbl = NT.indexOf(S.sub1) >= 0 ? '' : (' on a ' + S.table + ',');
  var pos = styleDesc + '. Full product shot, entire table fully visible in frame, complete table centered in composition, nothing cropped. Camera: slightly elevated 3/4 front-diagonal view. Wedding party ' + pd + mat + tbl + ' color palette: ' + colorDesc + '. Fabric texture: ' + drape + '. Lighting: studio soft box, soft and even, clean white background. No humans, no text, no logos. Photorealistic, highly detailed fabric texture, sharp focus on material quality.';
  var full = pos + ' --no ' + NEG;
  document.getElementById('po').textContent = full;
  document.getElementById('oa').style.display = 'block';
  document.getElementById('oa').scrollIntoView({behavior:'smooth', block:'nearest'});
});

document.getElementById('cpb').addEventListener('click', function() {
  var text = document.getElementById('po').textContent;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  this.textContent = 'Copied!';
  var self = this;
  setTimeout(function() { self.textContent = 'Copy'; }, 1500);
});

render();
</script>
</body>
</html>
