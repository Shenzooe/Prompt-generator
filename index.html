.color-swatch.selected { border-color: #1a1a1a; }
.swatch-dot { width: 24px; height: 24px; border-radius: 50%; margin: 0 auto 4px; border: 0.5px solid rgba(0,0,0,0.1); }
.swatch-name { font-size: 10px; color: #888; line-height: 1.3; }
.custom-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.custom-row input[type=color] { width: 40px; height: 40px; padding: 0; border-radius: 8px; border: none; cursor: pointer; flex-shrink: 0; -webkit-appearance: none; appearance: none; overflow: hidden; }
.custom-row input[type=text] { flex: 1; padding: 9px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
.custom-row input[type=text]:focus { border-color: #999; }
.prompt-box { background: #f5f4f0; border-radius: 6px; padding: 1rem; font-size: 13px; line-height: 1.8; color: #1a1a1a; white-space: pre-wrap; word-break: break-word; min-height: 110px; }
.copy-btn { margin-top: 8px; width: 100%; padding: 10px; font-size: 14px; cursor: pointer; background: #fff; border: 0.5px solid #ccc; border-radius: 6px; color: #1a1a1a; transition: background 0.12s; }
.copy-btn:hover { background: #f0ede8; }
.tabs { display: flex; margin-bottom: 1.25rem; border-bottom: 0.5px solid #e0ddd6; }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; white-space: nowrap; }
.tab.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 500; }
.mat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 0.75rem; }
.mat-chip { border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; overflow: hidden; background: #fff; transition: border 0.15s; }
.mat-chip.selected { border: 2px solid #1a1a1a; }
.mat-chip img { width: 100%; height: 64px; object-fit: cover; display: block; }
.mat-chip-label { font-size: 11px; padding: 5px 6px; text-align: center; line-height: 1.3; color: #1a1a1a; }
.breadcrumb { font-size: 12px; color: #888; margin-bottom: 0.75rem; }
.breadcrumb span { cursor: pointer; }
.breadcrumb span:last-child { color: #1a1a1a; font-weight: 500; cursor: default; }

.series-title { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 6px; }

<div class="tabs">
  <div class="tab active" onclick="switchTab('product')">商品</div>
  <div class="tab" onclick="switchTab('color')">顏色</div>
  <div class="tab" onclick="switchTab('mood')">氛圍</div>
  <div class="tab" onclick="switchTab('output')">輸出 Prompt</div>
</div>

<!-- ── Tab 1: 商品 ── -->
<div id="tab-product">
  <div id="selected-products-area" style="display:none;margin-bottom:1rem">
    <div class="section-label">已選商品</div>
    <div id="selected-tags" class="row" style="margin-bottom:0.5rem"></div>
    <hr class="divider">
  </div>

  <div id="breadcrumb-wrap" style="display:none">
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>

  <div id="cat-section">
    <div class="section-label">商品類別</div>
    <div class="row" id="cat-chips"></div>
  </div>

  <div id="sub1-section" style="display:none">
    <div class="section-label" id="sub1-label">子類別</div>
    <div class="row" id="sub1-chips"></div>
  </div>

  <div id="sub2-section" style="display:none">
    <div class="section-label" id="sub2-label">材質</div>
    <div class="mat-grid" id="sub2-chips"></div>
  </div>

  <hr class="divider">
  <div class="section-label">桌型</div>
  <div class="row" id="table-chips"></div>
</div>

<!-- ── Tab 2: 顏色 ── -->
<div id="tab-color" style="display:none">
  <div class="card" style="margin-bottom:1rem">
    <div class="section-label" style="margin-bottom:6px">SKU 解析</div>
    <div class="custom-row">
      <input type="text" id="sku-input" placeholder="貼入 SKU，如：TC-EMLD-001 或直接輸入 BLUSH、SAGE…" style="flex:1">

    </div>
    <div id="sku-result" style="font-size:12px;margin-top:4px;display:none"></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span id="color-count" style="font-size:12px;color:#888">0 / 3 已選</span>
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#888">

      <span>個別出圖</span>
    </div>
  </div>

  <div class="section-label">選擇色調（最多 3 色）</div>
  <div class="color-grid" id="color-grid"></div>

  <div class="section-label">自訂顏色</div>
  <div class="custom-row">
    <input type="color" id="custom-picker" value="#c8a8b8">
    <input type="text" id="custom-text" placeholder="顏色名稱（英文），如：mauve, dusty teal">
    <button class="chip" onclick="addCustom()">+ 加入</button>
  </div>
  <div id="custom-chips" class="row"></div>
</div>

<!-- ── Tab 3: 氛圍 ── -->
<div id="tab-mood" style="display:none">
  <div class="section-label">整體風格</div>
  <div class="row" id="style-chips"></div>
  <div class="section-label" style="margin-top:0.75rem">燈光氛圍</div>
  <div class="row" id="light-chips"></div>
  <div class="section-label" style="margin-top:0.75rem">質感關鍵字（可多選）</div>
  <div class="row" id="texture-chips"></div>
</div>

<!-- ── Tab 4: 輸出 ── -->
<div id="tab-output" style="display:none">
  <div class="section-label">主 Prompt</div>
  <div class="card">
    <div class="prompt-box" id="prompt-output">（請先在前幾步選擇設定）</div>

  </div>

  <div id="batch-btn-wrap" style="display:none;margin-bottom:0.75rem">
    <button class="copy-btn" onclick="toggleBatch()" id="batch-btn" style="margin-top:0">展開批量系列 Prompt</button>
  </div>
  <div id="series-section" style="display:none">
    <div class="section-label">批量系列 Prompt（每色獨立）</div>
    <div id="series-blocks"></div>
  </div>

  <div class="card" style="margin-top:0.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
      <div>
        <div class="section-label" style="margin-bottom:2px">AI 生成圖片</div>
        <div style="font-size:12px;color:#888">使用 FLUX.1 模型，依據上方 Prompt 直接生成</div>
      </div>
      <select id="img-model" style="font-size:12px;padding:5px 8px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer">
        <option value="black-forest-labs/FLUX.1-schnell">FLUX Schnell（快速）</option>
        <option value="black-forest-labs/FLUX.1-dev">FLUX Dev（高品質）</option>
      </select>
    </div>
    <button id="gen-btn" onclick="generateImage()" style="width:100%;padding:11px;font-size:14px;cursor:pointer;background:#1a1a1a;border:none;border-radius:6px;color:#fff;font-weight:500;transition:opacity 0.15s">✦ 生成圖片</button>
    <div id="gen-status" style="display:none;margin-top:10px;font-size:12px;color:#888;text-align:center"></div>
    <div id="gen-result" style="display:none;margin-top:12px">
      <img id="gen-image" src="" alt="generated" style="width:100%;border-radius:6px;border:0.5px solid #e0ddd6">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="downloadImage()" class="copy-btn" style="flex:1">↓ 下載圖片</button>
        <button onclick="generateImage()" class="copy-btn" style="flex:1">↺ 重新生成</button>
      </div>
    </div>
    <div id="gen-error" style="display:none;margin-top:10px;font-size:12px;color:#c0392b;background:#fdf0f0;padding:8px 12px;border-radius:6px"></div>
  </div>
</div>
</div><!-- /.container -->

var IM = {Polyester:'polyester',Scuba:'scuba','Satin & Lamour':'satin','Satin Shimmer':'satin','Satin & Taffeta':'satin','Satin & Velvet':'satin','Satin & Cheesecloth':'satin','Polyester & Satin':'polyester','Spandex & Fitted':'spandex','Spandex Fitted':'spandex','Sequin & Shimmer':'sequin','Sequin Sparkly':'sequin','Glittering Sequin':'sequin','Shimmer Sequin & Velvet':'sequin',Sequin:'sequin','Velvet & Flocking':'velvet','Crinkle Leaf & Rosette':'rosette','Jute Burlap & Lace':'burlap','Commercial Grade':'polyester'};

// ── Constants ────────────────────────────────────────────────────────
const TABLE_TYPES = [
  {val:'round table', label:'Round'},
  {val:'square table', label:'Square'},
  {val:'rectangular banquet table', label:'Rectangular Banquet'},
];
const STYLE_KEYS = ['romantic','minimalist','bohemian','glamour','garden','classic'];
const LIGHTS = ['soft natural daylight','warm golden hour','candlelight glow','studio soft box'];
const TEXTURES = ['silky smooth','delicate lace overlay','soft matte finish','subtle sheen','flowing chiffon folds','crisp linen texture'];

// ── State ────────────────────────────────────────────────────────────
let state = {
  selectedProducts: [],       // [{cat, sub1, sub2, key}]
  nav: { cat: null, sub1: null },
  table: 'round table',
  colors: [],                 // color prompt desc strings
  customColors: [],
  colorMode: 'mix',
  style: 'romantic',
  light: 'soft natural daylight',
  textures: [],
};

let batchOpen = false;

// ── Tab Switching ────────────────────────────────────────────────────
function switchTab(name) {
  ['product','color','mood','output'].forEach((t, i) => {
    document.getElementById('tab-'+t).style.display = t === name ? 'block' : 'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === name);
  });
  if (name === 'output') generatePrompt();
}

// ── Product Tab ──────────────────────────────────────────────────────
function renderProductTab() {
  renderSelectedTags();
  renderBreadcrumb();
  renderCatChips();
  renderSub1Chips();
  renderSub2Chips();
  renderTableChips();
}

function renderCatChips() {
  const el = document.getElementById('cat-chips');
  el.innerHTML = '';
  Object.keys(NAV).forEach(cat => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.nav.cat === cat ? ' active' : '');
    d.textContent = cat;
    d.onclick = () => { state.nav.cat = cat; state.nav.sub1 = null; renderProductTab(); };
    el.appendChild(d);
  });
}

function renderSub1Chips() {
  const sec = document.getElementById('sub1-section');
  if (!state.nav.cat) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('sub1-label').textContent = state.nav.cat;
  const el = document.getElementById('sub1-chips');
  el.innerHTML = '';
  Object.keys(NAV[state.nav.cat]).forEach(sub1 => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.nav.sub1 === sub1 ? ' active' : '');
    d.textContent = sub1;
    d.onclick = () => {
      state.nav.sub1 = sub1;
      const mats = NAV[state.nav.cat][sub1];
      if (!mats || mats.length === 0) {
        addProduct(state.nav.cat, sub1, null);
      } else {
        renderProductTab();
      }
    };
    el.appendChild(d);
  });
}

function renderSub2Chips() {
  const sec = document.getElementById('sub2-section');
  if (!state.nav.cat || !state.nav.sub1) { sec.style.display = 'none'; return; }
  const mats = NAV[state.nav.cat][state.nav.sub1];
  if (!mats || mats.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('sub2-label').textContent = state.nav.sub1 + ' — 材質';
  const el = document.getElementById('sub2-chips');
  el.innerHTML = '';
  mats.forEach(mat => {
    const imgKey = IM[mat] || null;
    const isSelected = state.selectedProducts.some(p => p.cat === state.nav.cat && p.sub1 === state.nav.sub1 && p.sub2 === mat);
    const d = document.createElement('div');
    d.className = 'mat-chip' + (isSelected ? ' selected' : '');
    d.onclick = () => addProduct(state.nav.cat, state.nav.sub1, mat);
    if (imgKey && IMGS[imgKey]) {
      const img = document.createElement('img');
      img.src = IMGS[imgKey];
      d.appendChild(img);
    }
    const lbl = document.createElement('div');
    lbl.className = 'mat-chip-label';
    lbl.textContent = mat;
    d.appendChild(lbl);
    el.appendChild(d);
  });
}

function addProduct(cat, sub1, sub2) {
  const key = cat + '|' + sub1 + '|' + (sub2 || '');
  if (!state.selectedProducts.some(p => p.key === key)) {
    state.selectedProducts.push({ cat, sub1, sub2, key });
  }
  renderProductTab();
}

function removeProduct(key) {
  state.selectedProducts = state.selectedProducts.filter(p => p.key !== key);
  renderProductTab();
}

function renderSelectedTags() {
  const area = document.getElementById('selected-products-area');
  const el = document.getElementById('selected-tags');
  if (state.selectedProducts.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  el.innerHTML = '';
  state.selectedProducts.forEach(p => {
    const label = [p.sub1 || p.cat, p.sub2].filter(Boolean).join(' / ');
    const d = document.createElement('div');
    d.className = 'selected-tag';
    d.innerHTML = label + ' <span class="rm" onclick="removeProduct(\'' + p.key.replace(/'/g,"\\'") + '\')">×</span>';
    el.appendChild(d);
  });
}

function renderBreadcrumb() {
  const wrap = document.getElementById('breadcrumb-wrap');
  const el = document.getElementById('breadcrumb');
  if (!state.nav.cat) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const parts = [state.nav.cat, state.nav.sub1].filter(Boolean);
  el.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    return `<span onclick="${isLast ? '' : 'navTo(' + i + ')'}" style="${!isLast ? 'text-decoration:underline;cursor:pointer' : 'cursor:default'}">${p}</span>`;
  }).join(' <span style="color:#ccc">›</span> ');
}

function navTo(level) {
  if (level === 0) state.nav.sub1 = null;
  renderProductTab();
}

function renderTableChips() {
  const el = document.getElementById('table-chips');
  el.innerHTML = '';
  TABLE_TYPES.forEach(t => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.table === t.val ? ' active' : '');
    d.textContent = t.label;
    d.onclick = () => { state.table = t.val; renderTableChips(); };
    el.appendChild(d);
  });
}

// ── Color Tab ────────────────────────────────────────────────────────
function renderColorGrid() {
  document.getElementById('color-grid').innerHTML = COLORS.map((c, i) => `
    <div class="color-swatch ${state.colors.includes(c.p) ? 'selected' : ''}" onclick="toggleColor(${i})">
      <div class="swatch-dot" style="background:${c.h}"></div>
      <div class="swatch-name">${c.n}</div>
    </div>
  `).join('');
}

function toggleColor(i) {
  const p = COLORS[i].p;
  if (state.colors.includes(p)) {
    state.colors = state.colors.filter(x => x !== p);
  } else {
    if (state.colors.length + state.customColors.length >= 3) return;
    state.colors.push(p);
  }
  renderColorGrid();
  updateColorCount();
}

function updateColorCount() {
  const total = state.colors.length + state.customColors.length;
  const el = document.getElementById('color-count');
  el.textContent = total + ' / 3 已選';
  el.style.color = total >= 3 ? '#c0392b' : '#888';
  renderColorGrid();
}

function addCustom() {
  const t = document.getElementById('custom-text').value.trim();
  if (!t) return;
  if (state.colors.length + state.customColors.length >= 3) return;
  state.customColors.push(t);
  document.getElementById('custom-text').value = '';
  renderCustomChips();
  updateColorCount();
}

function renderCustomChips() {
  const el = document.getElementById('custom-chips');
  el.innerHTML = '';
  state.customColors.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'chip active';
    d.textContent = c + ' ';
    const x = document.createElement('span');
    x.textContent = '×';
    x.style.cssText = 'cursor:pointer;margin-left:2px;opacity:0.5';
    x.onclick = (e) => { e.stopPropagation(); state.customColors.splice(i, 1); renderCustomChips(); updateColorCount(); };
    d.appendChild(x);
    el.appendChild(d);
  });
}

function toggleColorMode() {
  state.colorMode = state.colorMode === 'mix' ? 'separate' : 'mix';
  const toggle = document.getElementById('mode-toggle');
  const knob = document.getElementById('mode-knob');
  if (state.colorMode === 'separate') {
    toggle.style.background = '#1a1a1a'; knob.style.left = '20px';
  } else {
    toggle.style.background = '#ccc'; knob.style.left = '2px';
  }
}

// ── SKU Parser ───────────────────────────────────────────────────────
function parseSKU() {
  const raw = document.getElementById('sku-input').value.trim().toUpperCase();
  const resultEl = document.getElementById('sku-result');
  if (!raw) return;

  // Split by common separators and test each segment
  const segments = raw.split(/[-_/\s]+/);
  const found = [];

  // Also try compound codes (e.g. "046GD", "080GD")
  const compoundCodes = Object.keys(SKU_MAP).filter(k => k.match(/\d/));

  for (const seg of segments) {
    // Try exact match first
    if (SKU_MAP[seg]) {
      found.push({ code: seg, ...SKU_MAP[seg] });
      continue;
    }
    // Try compound codes that appear within segment
    for (const code of compoundCodes) {
      if (seg.includes(code) && SKU_MAP[code]) {
        found.push({ code, ...SKU_MAP[code] });
      }
    }
  }

  // Also try the full string as a code
  if (found.length === 0 && SKU_MAP[raw]) {
    found.push({ code: raw, ...SKU_MAP[raw] });
  }

  if (found.length === 0) {
    resultEl.style.display = 'block';
    resultEl.style.color = '#c0392b';
    resultEl.textContent = '找不到對應顏色，請確認 SKU 代碼';
    return;
  }

  const added = [];
  for (const match of found) {
    if (state.colors.length + state.customColors.length < 3) {
      if (!state.colors.includes(match.p)) {
        state.colors.push(match.p);
        added.push(match.n);
      }
    }
  }

  renderColorGrid();
  updateColorCount();

  resultEl.style.display = 'block';
  resultEl.style.color = added.length ? '#1a8c4e' : '#888';
  resultEl.textContent = added.length
    ? '已加入：' + added.join('、')
    : '顏色已在選單中或已達上限';
}

// ── Mood Tab ─────────────────────────────────────────────────────────
function renderMoodTab() {
  const styleEl = document.getElementById('style-chips');
  styleEl.innerHTML = '';
  STYLE_KEYS.forEach(k => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.style === k ? ' active' : '');
    d.textContent = STYLE_LABELS[k];
    d.onclick = () => { state.style = k; renderMoodTab(); };
    styleEl.appendChild(d);
  });

  const lightEl = document.getElementById('light-chips');
  lightEl.innerHTML = '';
  LIGHTS.forEach(l => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.light === l ? ' active' : '');
    d.textContent = l;
    d.onclick = () => { state.light = l; renderMoodTab(); };
    lightEl.appendChild(d);
  });

  const texEl = document.getElementById('texture-chips');
  texEl.innerHTML = '';
  TEXTURES.forEach(t => {
    const d = document.createElement('div');
    d.className = 'chip' + (state.textures.includes(t) ? ' active' : '');
    d.textContent = t;
    d.onclick = () => {
      state.textures = state.textures.includes(t)
        ? state.textures.filter(x => x !== t)
        : [...state.textures, t];
      renderMoodTab();
    };
    texEl.appendChild(d);
  });
}

// ── Prompt Building ──────────────────────────────────────────────────
function buildColorStr(allColors) {
  if (allColors.length === 0) return 'neutral warm tones';
  if (allColors.length === 1) return allColors[0];
  if (state.colorMode === 'mix') {
    return 'primary color: ' + allColors[0] + ', ' +
      allColors.slice(1).map((c, i) => (i === 0 ? 'accent color: ' : 'secondary accent: ') + c).join(', ');
  }
  return allColors[0];
}

function buildPrompt(colorOverride) {
  const allColors = colorOverride ? [colorOverride] : [...state.colors, ...state.customColors];
  const colorStr = buildColorStr(allColors);
  const styleDesc = STYLES_MAP[state.style] || state.style;

  let prodDescs = [];
  let matDescs = [];
  let hasTableProduct = false;

  if (state.selectedProducts.length === 0) {
    prodDescs = ['full table setting with linens'];
    hasTableProduct = true;
  } else {
    state.selectedProducts.forEach(p => {
      const productKey = p.sub1 || p.cat;
      const desc = PM[productKey] || PM[p.cat] || 'wedding party product';
      prodDescs.push(desc);
      if (p.sub2 && MT[p.sub2]) matDescs.push(MT[p.sub2]);
      const isNoTable = NT.includes(p.sub1) || NT.includes(p.cat);
      if (!isNoTable) hasTableProduct = true;
    });
  }

  const prodStr = prodDescs.join(' and ');
  const tableStr = hasTableProduct ? `, on a ${state.table}` : '';
  const matStr = matDescs.length > 0 ? ' Fabric texture: ' + matDescs.join('; ') + '.' : '';
  const texStr = state.textures.length > 0 ? ' ' + state.textures.join(', ') + '.' : '';

  return `${styleDesc}. Full product shot, entire product fully visible in frame, centered composition, nothing cropped. Camera: slightly elevated 3/4 front-diagonal view. Wedding party ${prodStr}${tableStr}, color palette: ${colorStr}.${matStr}${texStr} Lighting: ${state.light}, soft and even, clean white background. No humans, no text, no logos. Photorealistic, highly detailed fabric texture, sharp focus on material quality. --no ${NEG}`;
}

function generatePrompt() {
  const prompt = buildPrompt(null);
  document.getElementById('prompt-output').textContent = prompt;

  const allColors = [...state.colors, ...state.customColors];
  const batchWrap = document.getElementById('batch-btn-wrap');
  const seriesSec = document.getElementById('series-section');

  if (allColors.length > 1) {
    batchWrap.style.display = 'block';
    if (!batchOpen) seriesSec.style.display = 'none';
    else renderBatch(allColors);
  } else {
    batchWrap.style.display = 'none';
    seriesSec.style.display = 'none';
    batchOpen = false;
  }
}

function toggleBatch() {
  batchOpen = !batchOpen;
  const btn = document.getElementById('batch-btn');
  const sec = document.getElementById('series-section');
  if (batchOpen) {
    btn.textContent = '收起批量系列 Prompt';
    sec.style.display = 'block';
    renderBatch([...state.colors, ...state.customColors]);
  } else {
    btn.textContent = '展開批量系列 Prompt';
    sec.style.display = 'none';
  }
}

function renderBatch(allColors) {
  const el = document.getElementById('series-blocks');
  el.innerHTML = '';
  allColors.forEach((c, i) => {
    const text = buildPrompt(c);
    const block = document.createElement('div');
    block.className = 'series-block card';
    const title = document.createElement('div');
    title.className = 'series-title';
    title.textContent = '系列 ' + (i+1) + ' — ' + c;
    const box = document.createElement('div');
    box.className = 'prompt-box';
    box.style.cssText = 'min-height:80px;font-size:12px';
    box.textContent = text;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '複製';
    btn.onclick = () => { fallbackCopy(text); btn.textContent = '已複製！'; setTimeout(() => btn.textContent = '複製', 1500); };
    block.appendChild(title);
    block.appendChild(box);
    block.appendChild(btn);
    el.appendChild(block);
  });
}

// ── Clipboard ────────────────────────────────────────────────────────
function copyText(id, btn) {
  fallbackCopy(document.getElementById(id).textContent);
  const orig = btn.textContent;
  btn.textContent = '已複製！';
  setTimeout(() => btn.textContent = orig, 1500);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
}

// ── AI Image Generation ──────────────────────────────────────────────
async function generateImage() {
  const fullPrompt = document.getElementById('prompt-output').textContent;
  if (!fullPrompt || fullPrompt.includes('請先在前幾步')) {
    alert('請先前往「輸出 Prompt」頁面產生 Prompt，再生成圖片。');
    return;
  }
  const [positivePrompt, negPart] = fullPrompt.split(' --no ');
  const model = document.getElementById('img-model').value;
  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('gen-status');
  const result = document.getElementById('gen-result');
  const errBox = document.getElementById('gen-error');

  btn.disabled = true; btn.textContent = '生成中…'; btn.style.opacity = '0.6';
  status.style.display = 'block'; status.textContent = '⏳ 送出請求中，約需 10–30 秒…';
  result.style.display = 'none'; errBox.style.display = 'none';

  try {
    const res = await fetchWithRetry('/.netlify/functions/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: positivePrompt.trim(), model, negative_prompt: negPart ? negPart.trim() : undefined }),
    }, 3, status);

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '生成失敗，請稍後重試');

    document.getElementById('gen-image').src = data.image;
    result.style.display = 'block';
    status.style.display = 'none';
  } catch (err) {
    errBox.textContent = '❌ ' + err.message;
    errBox.style.display = 'block';
    status.style.display = 'none';
  } finally {
    btn.disabled = false; btn.textContent = '✦ 生成圖片'; btn.style.opacity = '1';
  }
}

async function fetchWithRetry(url, options, maxRetries, statusEl) {
  for (let i = 0; i < maxRetries; i++) {
    const res = await fetch(url, options);
    if (res.status === 503) {
      statusEl.textContent = `⏳ 模型載入中，20 秒後自動重試（第 ${i+1} 次）…`;
      await new Promise(r => setTimeout(r, 20000));
      continue;
    }
    return res;
  }
  throw new Error('模型暫時無法使用，請稍後再試');
}

function downloadImage() {
  const img = document.getElementById('gen-image');
  if (!img.src) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'wedding-decor-' + Date.now() + '.png';
  a.click();
}

renderProductTab();
renderColorGrid();
renderCustomChips();
updateColorCount();
renderMoodTab();
</script>
